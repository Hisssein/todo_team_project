<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Team Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>ToDo Team Project</h1>

        <div class="input-section">
            <input
                type="text"
                id="taskInput"
                placeholder="Entrer une nouvelle tâche"
            >

            <button id="addBtn">
                Ajouter
            </button>
        </div>

        <p id="counter">
            Nombre de tâches : 0
        </p>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>

</body>
</html>
